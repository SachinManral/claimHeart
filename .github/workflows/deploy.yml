name: deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: Optional image tag override
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_SHA}"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Simulated deployment
        run: |
          echo "Deploying claimheart-backend:${{ steps.tag.outputs.tag }} to ${{ inputs.environment }}"
          echo "Deploying claimheart-frontend:${{ steps.tag.outputs.tag }} to ${{ inputs.environment }}"
          echo "Run your infra command here (helm, ecs, kubectl, terraform apply, etc.)"
