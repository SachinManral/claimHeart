name: security-scan

on:
  pull_request:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  sast-bandit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          pip install bandit
      - run: bandit -r app -f screen -lll || true

  container-trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image for scan
        run: docker build -t claimheart-backend:scan ./backend
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: claimheart-backend:scan
          format: table
          exit-code: '0'
