name: rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to rollback
        required: true
        type: choice
        options:
          - staging
          - production
      previous_tag:
        description: Previously stable image tag
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Rollback deployment
        run: |
          echo "Rolling back ${{ inputs.environment }} to image tag ${{ inputs.previous_tag }}"
          echo "Insert rollback command for your orchestrator here"
